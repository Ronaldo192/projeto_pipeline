name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  POSTGRES_DB: pipeline
  POSTGRES_USER: pipeline
  POSTGRES_PASSWORD: pipeline123

jobs:
  # ──────────────────────────────────────────
  # 1. Lint & Formatação
  # ──────────────────────────────────────────
  lint:
    name: "Lint & Formatação"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instala dependências de qualidade
        run: pip install black flake8 isort

      - name: Black – verifica formatação
        run: black --check python/

      - name: isort – verifica imports
        run: isort --check-only python/

      - name: Flake8 – verifica estilo
        run: flake8 python/ --max-line-length=120 --exclude=__pycache__

  # ──────────────────────────────────────────
  # 2. Testes unitários
  # ──────────────────────────────────────────
  test:
    name: "Testes Unitários"
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pipeline"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instala dependências
        run: pip install -r requirements.txt

      - name: Executa testes com cobertura
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin123
        run: |
          pytest python/tests/ -v --cov=python --cov-report=xml --cov-report=term-missing

      - name: Upload cobertura para Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ──────────────────────────────────────────
  # 3. Build Docker
  # ──────────────────────────────────────────
  build:
    name: "Build Docker"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagem Python worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.python
          push: false
          tags: pipeline-python:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────
  # 4. Validação dbt
  # ──────────────────────────────────────────
  dbt-validate:
    name: "dbt – Validação dos modelos"
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pipeline"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instala dbt
        run: pip install dbt-postgres==1.7.3

      - name: Inicializa schemas PostgreSQL
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}
        run: |
          psql -h localhost -U ${{ env.POSTGRES_USER }} -d ${{ env.POSTGRES_DB }} -f postgres/init.sql

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt parse (valida modelos)
        working-directory: dbt
        env:
          DBT_POSTGRES_HOST: localhost
          DBT_POSTGRES_PORT: 5432
          DBT_POSTGRES_DB: ${{ env.POSTGRES_DB }}
          DBT_POSTGRES_USER: ${{ env.POSTGRES_USER }}
          DBT_POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        run: dbt parse

  # ──────────────────────────────────────────
  # 5. Deploy (apenas em push para main)
  # ──────────────────────────────────────────
  deploy:
    name: "Deploy"
    runs-on: ubuntu-latest
    needs: [build, dbt-validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy informativo
        run: |
          echo "✅ Pipeline validado com sucesso!"
          echo "📦 Branch: ${{ github.ref_name }}"
          echo "🔖 Commit: ${{ github.sha }}"
          echo ""
          echo "Para fazer deploy local, execute:"
          echo "  docker compose up -d"
