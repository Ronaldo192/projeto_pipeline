version: 2

sources:
  - name: raw
    description: "Dados brutos carregados pelo pipeline Python"
    schema: raw
    tables:
      - name: customers
        description: "Clientes do e-commerce"
        columns:
          - name: customer_id
            tests: [unique, not_null]
          - name: state
            tests: [not_null]

      - name: orders
        description: "Pedidos realizados"
        columns:
          - name: order_id
            tests: [unique, not_null]
          - name: customer_id
            tests: [not_null]
          - name: order_status
            tests:
              - not_null
              - accepted_values:
                  values: ['delivered', 'shipped', 'canceled', 'invoiced', 'processing', 'approved']

      - name: order_items
        description: "Itens de cada pedido"
        columns:
          - name: order_id
            tests: [not_null]
          - name: product_id
            tests: [not_null]
          - name: price
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
                  inclusive: false

      - name: order_payments
        description: "Pagamentos dos pedidos"
        columns:
          - name: order_id
            tests: [not_null]
          - name: payment_type
            tests:
              - accepted_values:
                  values: ['credit_card', 'boleto', 'voucher', 'debit_card']

      - name: products
        description: "Catálogo de produtos"
        columns:
          - name: product_id
            tests: [unique, not_null]

      - name: product_categories
        description: "Tradução de categorias"
        columns:
          - name: product_category_name
            tests: [unique, not_null]
